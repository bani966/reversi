name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: git ls-files '*.cpp' '*.hpp' | xargs clang-format-18 --dry-run --Werror

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true
      - name: Configure
        run: cmake --preset ci-windows
      - name: Build
        run: cmake --build --preset ci-windows
      - name: Test
        run: ctest --preset ci-windows

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.*'   # >= 6.9.2 required: AGL removed from the macOS 26 SDK (QTBUG-137687)
          arch: clang_64
          modules: qtmultimedia
          cache: true

  linux:
    # Engine + CLI + tests only; no Qt on Linux keeps this job fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux
      - name: Build
        run: cmake --build --preset ci-linux --parallel
      - name: Test
        run: ctest --preset ci-linux

  sanitize:
    # ASan + UBSan over the full test suite.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux-sanitize
      - name: Build
        run: cmake --build --preset ci-linux-sanitize --parallel
      - name: Test
        run: ctest --preset ci-linux-sanitize

  tsan:
    # ThreadSanitizer, separate from the sanitize job above since ASan/UBSan and TSan can't be
    # combined in one binary. Added at M8 (Lazy SMP): this is the first genuinely concurrent
    # shared-mutable-state code in the project (SharedTranspositionTable, engine/shared_tt.hpp)
    # - this job is the actual authority on data-race freedom, not the local concurrent stress
    # test (tests/engine/shared_tt_test.cpp), which is inherently a "didn't observe a failure"
    # style check.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux-tsan
      - name: Build
        run: cmake --build --preset ci-linux-tsan --parallel
      - name: Test
        run: ctest --preset ci-linux-tsan
