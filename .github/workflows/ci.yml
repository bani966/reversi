name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  # Lets a Release be (re-)published for an already-existing tag without deleting/recreating it -
  # select the tag itself (not a branch) as "Use workflow from" in the Run workflow UI, so
  # github.ref resolves to that tag and the release job's own `if` below picks it up identically
  # to a real tag push.
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: git ls-files '*.cpp' '*.hpp' | xargs clang-format-18 --dry-run --Werror

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true
      - name: Configure
        run: cmake --preset ci-windows
      - name: Build
        run: cmake --build --preset ci-windows
      - name: Test
        run: ctest --preset ci-windows
      # M10 phase 5: packaging. Deploy step invokes windeployqt via qt_generate_deploy_app_script()
      # (app/CMakeLists.txt) - one mechanism, no hand-rolled DLL copying.
      # qt6_deploy_qt_conf requires an absolute --prefix (it writes qt.conf's path as-is, with no
      # join against the working directory) - confirmed by this exact failure the first time this
      # ran on CI with a relative one; local verification had used an absolute path throughout, so
      # this didn't surface until now.
      - name: Deploy (windeployqt)
        run: cmake --install build/msvc --config Release --prefix "${{ github.workspace }}/build/msvc/deploy"
      - name: Build installer (Inno Setup)
        # windows-2022 ships Inno Setup 6 preinstalled at the path below; fall back to a PATH
        # search so this doesn't silently no-op if the runner image ever moves it.
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source }
          if (-not $iscc) { throw "ISCC.exe not found - Inno Setup missing from this runner image" }
          & $iscc "/DMyDeployDir=${{ github.workspace }}/build/msvc/deploy" "${{ github.workspace }}/build/msvc/packaging/windows/reversi.iss"
      - name: Build portable zip
        working-directory: build/msvc/deploy
        run: cmake -E tar cf "${{ github.workspace }}/reversi-windows-portable.zip" --format=zip bin plugins
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: reversi-windows-installer
          path: build/msvc/packaging/windows/Output/*.exe
      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: reversi-windows-portable
          path: reversi-windows-portable.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.*'   # >= 6.9.2 required: AGL removed from the macOS 26 SDK (QTBUG-137687)
          arch: clang_64
          modules: qtmultimedia
          cache: true
      - name: Configure
        run: cmake --preset ci-macos
      - name: Build
        run: cmake --build --preset ci-macos --parallel
      - name: Test
        run: ctest --preset ci-macos
      # M10 phase 5: packaging. Deploy step invokes macdeployqt via qt_generate_deploy_app_script()
      # (app/CMakeLists.txt); the second, direct macdeployqt call below re-targets the already-
      # deployed bundle purely to add its -dmg flag (qt_generate_deploy_app_script has no DMG
      # option of its own) - install-qt-action puts Qt's bin/ (and macdeployqt) on PATH.
      # Same absolute-prefix requirement as the Windows job's deploy step above.
      - name: Deploy (macdeployqt)
        run: cmake --install build/release --prefix "${{ github.workspace }}/build/release/deploy"
      - name: Package DMG
        run: macdeployqt build/release/deploy/reversi-app.app -dmg
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: reversi-macos-dmg
          path: build/release/deploy/*.dmg

  linux:
    # Engine + CLI + tests only; no Qt on Linux keeps this job fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux
      - name: Build
        run: cmake --build --preset ci-linux --parallel
      - name: Test
        run: ctest --preset ci-linux

  sanitize:
    # ASan + UBSan over the full test suite.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux-sanitize
      - name: Build
        run: cmake --build --preset ci-linux-sanitize --parallel
      - name: Test
        run: ctest --preset ci-linux-sanitize

  tsan:
    # ThreadSanitizer, separate from the sanitize job above since ASan/UBSan and TSan can't be
    # combined in one binary. Added at M8 (Lazy SMP): this is the first genuinely concurrent
    # shared-mutable-state code in the project (SharedTranspositionTable, engine/shared_tt.hpp)
    # - this job is the actual authority on data-race freedom, not the local concurrent stress
    # test (tests/engine/shared_tt_test.cpp), which is inherently a "didn't observe a failure"
    # style check.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux-tsan
      - name: Build
        run: cmake --build --preset ci-linux-tsan --parallel
      - name: Test
        run: ctest --preset ci-linux-tsan

  # Publishes a GitHub Release with the Windows installer/portable zip and macOS DMG attached,
  # whenever a v* tag is pushed (or this workflow is manually re-run against an existing tag - see
  # workflow_dispatch above). Requires every other job to succeed first - not just windows/macos,
  # which merely produce the artifacts - so a release never gets published on the back of a
  # sanitizer/TSan/format failure elsewhere in the same run. Uses the plain gh CLI (preinstalled on
  # every GitHub-hosted runner) rather than a third-party release-publishing Action, so there's no
  # new dependency to vet.
  release:
    needs: [format, windows, macos, linux, sanitize, tsan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: reversi-windows-installer
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: reversi-windows-portable
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: reversi-macos-dmg
          path: dist
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "Reversi ${{ github.ref_name }}" \
            --generate-notes
